name: CI Failure Summary

on:
  workflow_call:
    inputs:
      artifact_name:
        description: "Name/pattern of artifact(s) containing JUnit XML files"
        required: false
        type: string
        default: test-results-*
      pr_number:
        description: "Optional PR number to post/update a comment on"
        required: false
        type: string
        default: ""
      sha:
        description: "Commit SHA used for source links"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Download test result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.artifact_name }}
          path: test-results
          merge-multiple: true

      - name: Checkout reusable workflow scripts
        uses: actions/checkout@v4
        with:
          repository: YannikSpaeth/ci-failure-summary-workflow
          ref: main
          path: _reusable
          sparse-checkout: |
            .github/scripts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install parser dependencies
        run: |
          python -m pip install --upgrade pip
          pip install junitparser jinja2 requests

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          PR_NUMBER='${{ inputs.pr_number }}'
          if [ -z "$PR_NUMBER" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER='${{ github.event.pull_request.number }}'
          fi

          SHA='${{ inputs.sha }}'
          if [ -z "$SHA" ]; then
            SHA='${{ github.sha }}'
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Build summary and optionally post PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python _reusable/.github/scripts/merge_and_post.py \
            --xml-dir test-results \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --sha "${{ steps.meta.outputs.sha }}" \
            --pr-number "${{ steps.meta.outputs.pr_number }}"
